<!DOCTYPE html>
<html>
<head>
    <title>Observed Technique Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin-left: 200px;
        }

        .nav {
            height: 100%;
            width: 200px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #f8f9fa;
            overflow-x: hidden;
            padding-top: 20px;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
        }

        .nav a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 18px;
            color: #495057;
            display: block;
        }

        .nav a:hover {
            color: #007bff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="nav">
        <a href="/">Search</a>
        <a href="/observed">Observed</a>
        <a href="/developed">Developed</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <div class="container py-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title text-primary">Observed Technique Details</h1>
                <dl class="row">
                    <dt class="col-sm-3">Technique ID</dt>
                    <dd class="col-sm-9">{{ observed_technique[1] }}</dd>

                    <dt class="col-sm-3">Technique Name</dt>
                    <dd class="col-sm-9">{{ observed_technique[2] }}</dd>

                    <dt class="col-sm-3">Environment</dt>
                    <dd class="col-sm-9">{{ observed_technique[3] }}</dd>

                    <dt class="col-sm-3">Sample</dt>
                    <dd class="col-sm-9">
                        <pre><code>{{ observed_technique[4] }}</code></pre>
                    </dd>
                </dl>
                <a href="{{ url_for('observed') }}" class="btn btn-primary">Back to Observed Techniques</a>
            </div>
        </div>
    </div>
</body>
</html>
