<!DOCTYPE html>
<html>
<head>
    <title>Coverage Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin-left: 200px;
        }

        .nav {
            height: 100%;
            width: 200px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #f8f9fa;
            overflow-x: hidden;
            padding-top: 20px;
            border-right: 1px solid #dee2e6;
        }

        .nav a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 18px;
            color: #495057;
            display: block;
        }

        .nav a:hover {
            color: #007bff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="nav">
        <a href="/">Search</a>
        <a href="/observed">Observed</a>
        <a href="/developed">Developed</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <div class="container py-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title text-primary">Coverage Dashboard</h1>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-primary">
                            <tr>
                                <th scope="col">Technique ID</th>
                                <th scope="col">Coverage</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in coverage_data %}
                                <tr>
                                    <td>{{ item.technique_id }}</td>
                                    <td style="background-color: {{ item.color }};">{{ item.percentage }}</td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
