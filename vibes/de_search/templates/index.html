<!DOCTYPE html>
<html>
<head>
    <title>Detection Rule Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h1 class="card-title text-primary">Detection Rule Search</h1>
                <form action="/search" method="get">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" name="q" value="{{ query if query else '' }}" placeholder="Enter search term...">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </form>
            </div>
        </div>

        {% if results %}
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-primary">Search Results:</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-primary">
                            <tr>
                                <th scope="col">Name</th>
                                <th scope="col">Source</th>
                                <th scope="col">URL</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for result in results %}
                                <tr>
                                    <td>{{ result[0] }}</td>
                                    <td>{{ result[1] }}</td>
                                    <td><a href="{{ result[2] }}" target="_blank">{{ result[2] }}</a></td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
