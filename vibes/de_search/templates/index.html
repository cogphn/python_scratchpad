<!DOCTYPE html>
<html>
<head>
    <title>Detection Rule Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin-left: 200px;
        }

        .nav {
            height: 100%;
            width: 200px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #f8f9fa;
            overflow-x: hidden;
            padding-top: 20px;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
        }

        .nav a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 18px;
            color: #495057;
            display: block;
        }

        .nav a:hover {
            color: #007bff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="nav">
        <a href="/">Search</a>
        <a href="/observed">Observed</a>
        <a href="/developed">Developed</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <div class="container py-5">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h1 class="card-title text-primary">Detection Rule Search</h1>
                <form action="/search" method="get">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" name="q" value="{{ query if query else '' }}" placeholder="Enter search term...">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </form>
            </div>
        </div>

        {% if results %}
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-primary">Search Results:</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-primary">
                            <tr>
                                <th scope="col">Name</th>
                                <th scope="col">Source</th>
                                <th scope="col">URL</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for result in results %}
                                <tr>
                                    <td>{{ result[0] }}</td>
                                    <td>{{ result[1] }}</td>
                                    <td><a href="{{ result[2] }}" target="_blank">{{ result[2] }}</a></td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
