<!DOCTYPE html>
<html>
<head>
    <title>Observed Techniques</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin-left: 200px;
        }

        .nav {
            height: 100%;
            width: 200px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #f8f9fa;
            overflow-x: hidden;
            padding-top: 20px;
            border-right: 1px solid #dee2e6;
        }

        .nav a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 18px;
            color: #495057;
            display: block;
        }

        .nav a:hover {
            color: #007bff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="nav">
        <a href="/">Search</a>
        <a href="/observed">Observed</a>
        <a href="/developed">Developed</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <div class="container py-5">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h1 class="card-title text-primary">Observed Techniques</h1>
                <form action="/observed" method="post">
                    <div class="mb-3">
                        <label for="technique" class="form-label">Technique</label>
                        <select class="form-select" id="technique" name="technique">
                            {% for technique in techniques %}
                                <option value="{{ technique[0] }}">{{ technique[0] }} - {{ technique[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="environment" class="form-label">Environment</label>
                        <input type="text" class="form-control" id="environment" name="environment" placeholder="Enter environment...">
                    </div>
                    <button class="btn btn-primary" type="submit">Submit</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-primary">Previously Observed Techniques:</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-primary">
                            <tr>
                                <th scope="col">Technique ID</th>
                                <th scope="col">Technique Name</th>
                                <th scope="col">Environment</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for row in observed_techniques %}
                                <tr>
                                    <td>{{ row[0] }}</td>
                                    <td>{{ row[1] }}: {{ row[2] }}</td>
                                    <td>{{ row[3] }}</td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
