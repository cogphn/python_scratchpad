<!DOCTYPE html>
<html>
<head>
    <title>Edit Observed Technique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin-left: 200px;
        }

        .nav {
            height: 100%;
            width: 200px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #f8f9fa;
            overflow-x: hidden;
            padding-top: 20px;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
        }

        .nav a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 18px;
            color: #495057;
            display: block;
        }

        .nav a:hover {
            color: #007bff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="nav">
        <a href="/">Search</a>
        <a href="/observed">Observed</a>
        <a href="/developed">Developed</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <div class="container py-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title text-primary">Edit Observed Technique</h1>
                <form action="{{ url_for('edit_observed', observed_id=observed_technique[0]) }}" method="post">
                    <div class="mb-3">
                        <label for="technique" class="form-label">Technique</label>
                        <select class="form-select" id="technique" name="technique">
                            {% for technique in techniques %}
                                <option value="{{ technique[0] }}" {% if technique[0] == observed_technique[1] %}selected{% endif %}>{{ technique[0] }} - {{ technique[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="environment" class="form-label">Environment</label>
                        <input type="text" class="form-control" id="environment" name="environment" value="{{ observed_technique[3] }}">
                    </div>
                    <div class="mb-3">
                        <label for="sample" class="form-label">Sample</label>
                        <textarea class="form-control" id="sample" name="sample" rows="5">{{ observed_technique[4] }}</textarea>
                    </div>
                    <button class="btn btn-primary" type="submit">Update</button>
                    <a href="{{ url_for('observed') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
