<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTC Live Station Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ttc: {
                            yellow: '#FFC72C',
                            green: '#00923F',
                            red: '#DA291C',
                            dark: '#111827'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .pulse-live {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 pt-4 pb-0 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 pb-4">
            <!-- Station Title and Icon -->
            <div class="flex items-center gap-4 w-full md:w-auto">
                <!-- Dynamic Subway Line Icon -->
                <div id="header-line-icon" class="w-12 h-12 rounded-full bg-red-600 text-white flex items-center justify-center font-bold text-2xl border-4 border-gray-950 shadow-inner transition-colors duration-300">
                    T
                </div>
                <div>
                    <h1 id="header-station-name" class="text-2xl font-bold tracking-tight flex items-center gap-2">
                        Loading...
                    </h1>
                    <p id="header-line-name" class="text-sm text-gray-400">TTC Transit Station</p>
                </div>
            </div>
            
            <!-- Controls & Live Status -->
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                <!-- Station Selector -->
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <label for="station-select" class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Station:</label>
                    <select id="station-select" class="bg-gray-850 border border-gray-700 text-gray-200 text-sm rounded-lg focus:ring-ttc-yellow focus:border-ttc-yellow block w-full sm:w-48 p-2.5 bg-gray-800 hover:bg-gray-755 transition cursor-pointer">
                        <option value="king_station">King Station (Line 1)</option>
                        <option value="woodbine_station">Woodbine Station (Line 2)</option>
                    </select>
                </div>

                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <div id="live-clock" class="text-xl font-mono font-semibold text-gray-300">--:--:--</div>
                        <div class="text-xs text-gray-500 flex items-center justify-end gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-green-500 pulse-live"></span>
                            Live System
                        </div>
                    </div>
                    <button id="refresh-btn" class="bg-gray-800 hover:bg-gray-700 text-gray-300 hover:text-white p-3 rounded-lg border border-gray-700 transition duration-200 flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-rotate"></i>
                        <span>Refresh</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Navigation Tabs -->
        <div class="max-w-6xl mx-auto border-t border-gray-800/50">
            <nav class="flex gap-6 -mb-px">
                <a href="/" class="border-b-2 border-ttc-yellow text-ttc-yellow px-1 py-3 text-sm font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-list-ul"></i>
                    Schedule
                </a>
                <a href="/map" class="border-b-2 border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-700 px-1 py-3 text-sm font-semibold flex items-center gap-2 transition duration-150">
                    <i class="fa-solid fa-map-location-dot"></i>
                    Live Map
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-6 py-8">
        <!-- Error Message -->
        <div id="error-container" class="hidden mb-6 bg-red-900/30 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg flex items-center gap-3">
            <i class="fa-solid fa-circle-exclamation text-red-400 text-lg"></i>
            <div>
                <span class="font-bold">Error:</span> <span id="error-message">Failed to load transit data.</span>
            </div>
        </div>

        <!-- Subway Platforms Section -->
        <div class="mb-10">
            <h3 class="text-xs font-semibold text-gray-400 mb-4 tracking-wider uppercase">Subway Platforms</h3>
            <!-- Dynamically populated grid of subway platforms -->
            <div id="platforms-container" class="grid md:grid-cols-2 gap-8">
                <!-- Loading Skeletons -->
                <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 animate-pulse space-y-4">
                    <div class="h-6 bg-gray-800 rounded w-1/3"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                </div>
                <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 animate-pulse space-y-4">
                    <div class="h-6 bg-gray-800 rounded w-1/3"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                </div>
            </div>
        </div>

        <!-- Connecting Bus Routes Section (Hidden by default, shown if buses exist) -->
        <div id="buses-section" class="mb-10 hidden">
            <h3 class="text-xs font-semibold text-gray-400 mb-4 tracking-wider uppercase">Connecting Bus Routes</h3>
            <div id="buses-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Dynamically populated bus cards -->
            </div>
        </div>

        <!-- Station Info / Entrances -->
        <div class="mt-12 bg-gray-900/50 rounded-2xl border border-gray-800/80 p-6">
            <h3 class="text-sm font-semibold text-gray-400 mb-4 tracking-wider uppercase">Station Layout & Entrances</h3>
            <div id="entrances-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <!-- Will be populated by JS -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-950 border-t border-gray-900 py-6 px-6 text-center text-xs text-gray-600">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <p>Data sourced from <a href="https://myttc.ca" target="_blank" class="hover:text-gray-400 underline transition font-medium">myttc.ca</a>. Not affiliated with the TTC.</p>
            <p id="last-updated-text">Last updated: Never</p>
        </div>
    </footer>

    <script>
        // Line configurations & styling
        const LINE_CONFIGS = {
            'yonge-university-spadina_subway': {
                number: '1',
                name: 'Yonge-University Line',
                colorClass: 'bg-[#FFC72C] text-gray-950',
                borderClass: 'border-[#FFC72C]',
                textClass: 'text-[#FFC72C]',
                bgLightClass: 'from-[#FFC72C]/10',
                accentColor: '#FFC72C'
            },
            'bloor-danforth_subway': {
                number: '2',
                name: 'Bloor-Danforth Line',
                colorClass: 'bg-[#00923F] text-white',
                borderClass: 'border-[#00923F]',
                textClass: 'text-[#00923F]',
                bgLightClass: 'from-[#00923F]/10',
                accentColor: '#00923F'
            },
            'default': {
                number: 'T',
                name: 'TTC Transit',
                colorClass: 'bg-red-600 text-white',
                borderClass: 'border-red-600',
                textClass: 'text-red-500',
                bgLightClass: 'from-red-600/10',
                accentColor: '#DA291C'
            }
        };

        // State
        let currentStation = 'king_station';
        let stationData = null;
        let lastFetchTime = null;
        let autoRefreshTimer = null;

        // Elements
        const stationSelect = document.getElementById('station-select');
        const platformsContainer = document.getElementById('platforms-container');
        const busesSection = document.getElementById('buses-section');
        const busesContainer = document.getElementById('buses-container');
        const entrancesGrid = document.getElementById('entrances-grid');
        const refreshBtn = document.getElementById('refresh-btn');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const lastUpdatedText = document.getElementById('last-updated-text');
        const liveClock = document.getElementById('live-clock');
        
        // Header Elements
        const headerLineIcon = document.getElementById('header-line-icon');
        const headerStationName = document.getElementById('header-station-name');
        const headerLineName = document.getElementById('header-line-name');

        // Live Clock
        function updateClock() {
            const now = new Date();
            liveClock.textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Fetch Data from Backend
        async function fetchData() {
            refreshBtn.disabled = true;
            refreshBtn.querySelector('i').classList.add('fa-spin');
            
            try {
                const response = await fetch(`/api/data/${currentStation}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                stationData = await response.json();
                lastFetchTime = new Date();
                
                errorContainer.classList.add('hidden');
                renderData();
            } catch (error) {
                console.error("Could not fetch data:", error);
                errorMessage.textContent = `Failed to sync with TTC servers: ${error.message}`;
                errorContainer.classList.remove('hidden');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.querySelector('i').classList.remove('fa-spin');
            }
        }

        // Render Data dynamically
        function renderData() {
            if (!stationData) return;

            // 1. Update Header Info
            headerStationName.textContent = stationData.name;
            lastUpdatedText.textContent = `Last updated: ${lastFetchTime.toLocaleTimeString()}`;

            // Reset containers
            platformsContainer.innerHTML = '';
            busesContainer.innerHTML = '';
            entrancesGrid.innerHTML = '';
            busesSection.classList.add('hidden');

            const stops = stationData.stops || [];
            const referenceTime = stationData.time; // Unix timestamp from server

            let primaryLineConfig = LINE_CONFIGS.default;
            let hasBuses = false;

            // First pass: Find primary line for header styling
            for (const stop of stops) {
                if (stop.routes && stop.routes.length > 0) {
                    const subwayRoute = stop.routes.find(r => r.uri.includes('subway'));
                    if (subwayRoute && LINE_CONFIGS[subwayRoute.uri]) {
                        primaryLineConfig = LINE_CONFIGS[subwayRoute.uri];
                        break;
                    }
                }
            }

            // Update Header Icon and subtitle
            headerLineIcon.textContent = primaryLineConfig.number;
            headerLineIcon.className = `w-12 h-12 rounded-full flex items-center justify-center font-bold text-2xl border-4 border-gray-950 shadow-inner transition-all duration-300 ${primaryLineConfig.colorClass}`;
            headerLineName.textContent = primaryLineConfig.name;

            // Second pass: Render content
            stops.forEach(stop => {
                const isPlatform = stop.name.includes('Platform');
                const isBusBay = stop.name.includes('Bus Bay') || stop.uri.includes('bus_bay');

                if (stop.routes && stop.routes.length > 0) {
                    if (isPlatform) {
                        // Render Subway Platform Column
                        const platformColumn = createPlatformColumn(stop, referenceTime);
                        platformsContainer.appendChild(platformColumn);
                    } else if (isBusBay) {
                        // Render Bus Bay Cards
                        hasBuses = true;
                        stop.routes.forEach(route => {
                            const busCard = createBusCard(route, stop.name, referenceTime);
                            busesContainer.appendChild(busCard);
                        });
                    }
                } else {
                    // Render Entrance
                    if (stop.name && !stop.name.includes('Mezzanine') && !stop.name.includes('Landing')) {
                        const entranceCard = document.createElement('div');
                        entranceCard.className = 'bg-gray-900/35 border border-gray-800/60 p-3 rounded-xl flex items-center gap-2.5 text-xs text-gray-400';
                        entranceCard.innerHTML = `
                            <i class="fa-solid fa-door-open text-gray-600"></i>
                            <span class="truncate" title="${stop.name}">${stop.name.replace(stationData.name + ' ', '')}</span>
                        `;
                        entrancesGrid.appendChild(entranceCard);
                    }
                }
            });

            // Show buses section if any were rendered
            if (hasBuses) {
                busesSection.classList.remove('hidden');
            }

            // Adjust grid columns if only 1 platform (unlikely, but safe)
            const platformCount = platformsContainer.children.length;
            if (platformCount === 1) {
                platformsContainer.className = 'grid grid-cols-1 max-w-2xl mx-auto gap-8';
            } else {
                platformsContainer.className = 'grid md:grid-cols-2 gap-8';
            }
        }

        // Helper to create a Subway Platform Column
        function createPlatformColumn(stop, referenceTime) {
            const col = document.createElement('div');
            col.className = 'bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-xl flex flex-col';

            // Get line config for styling
            let lineConfig = LINE_CONFIGS.default;
            let routeName = 'Subway';
            let direction = '';

            if (stop.routes && stop.routes[0]) {
                const route = stop.routes[0];
                routeName = route.name;
                if (LINE_CONFIGS[route.uri]) {
                    lineConfig = LINE_CONFIGS[route.uri];
                }
                
                // Determine direction based on shape of first stop time
                if (route.stop_times && route.stop_times[0]) {
                    const shape = route.stop_times[0].shape || '';
                    direction = shape.substring(shape.indexOf('To ')).replace(' Station', '');
                }
            }

            // Header for this platform
            const header = document.createElement('div');
            header.className = `bg-gradient-to-r ${lineConfig.bgLightClass} to-transparent p-5 border-b border-gray-800 flex justify-between items-center`;
            
            const isNorthOrEast = stop.name.includes('Northbound') || stop.name.includes('Eastbound');
            const arrowIcon = isNorthOrEast ? 'fa-circle-arrow-up' : 'fa-circle-arrow-down';

            header.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fa-solid ${arrowIcon} ${lineConfig.textClass} text-xl"></i>
                    <h2 class="text-lg font-bold text-gray-200">${stop.name.replace(stationData.name + ' ', '')}</h2>
                </div>
                <span class="text-xs font-semibold ${lineConfig.colorClass} px-2.5 py-1 rounded-full border ${lineConfig.borderClass}/20">
                    ${direction || 'Active'}
                </span>
            `;
            col.appendChild(header);

            // List of departures
            const listContainer = document.createElement('div');
            listContainer.className = 'p-6 flex-grow space-y-4';

            const route = stop.routes[0];
            if (route && route.stop_times && route.stop_times.length > 0) {
                route.stop_times.forEach(time => {
                    const card = createDepartureCard(time, referenceTime, lineConfig);
                    listContainer.appendChild(card);
                });
            } else {
                listContainer.innerHTML = '<div class="text-center py-8 text-gray-500">No scheduled departures</div>';
            }

            col.appendChild(listContainer);
            return col;
        }

        // Helper to create an individual Subway Departure Card
        function createDepartureCard(stopTime, referenceTime, lineConfig) {
            const div = document.createElement('div');
            div.className = 'bg-gray-800/40 border border-gray-800/80 hover:border-gray-700 rounded-xl p-4 flex justify-between items-center transition duration-150';

            // Calculate wait time
            const diffSeconds = stopTime.departure_timestamp - referenceTime;
            const diffMinutes = Math.max(0, Math.round(diffSeconds / 60));
            
            let countdownText = '';
            let countdownClass = '';
            
            if (diffMinutes === 0) {
                countdownText = 'Arriving';
                countdownClass = 'text-green-400 font-bold pulse-live';
            } else if (diffMinutes === 1) {
                countdownText = '1 min';
                countdownClass = `${lineConfig.textClass} font-semibold`;
            } else {
                countdownText = `${diffMinutes} min`;
                countdownClass = 'text-gray-200 font-semibold';
            }

            // Clean destination
            let destination = stopTime.shape || 'Subway';
            destination = destination.replace(/.*To /, '').replace(' Station', '');

            div.innerHTML = `
                <div class="flex items-center gap-3.5">
                    <div class="w-2 h-10 ${lineConfig.colorClass} rounded-full"></div>
                    <div>
                        <div class="text-sm font-semibold text-gray-400">Line ${lineConfig.number} Subway</div>
                        <div class="text-base font-bold text-white">${destination}</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-2xl ${countdownClass} font-mono">${countdownText}</div>
                    <div class="text-xs text-gray-500 mt-0.5">${stopTime.departure_time}</div>
                </div>
            `;
            return div;
        }

        // Helper to create a Connecting Bus Card
        function createBusCard(route, bayName, referenceTime) {
            const card = document.createElement('div');
            card.className = 'bg-gray-900 rounded-xl border border-gray-800 overflow-hidden shadow-md flex flex-col';

            // Bus header (Red)
            const header = document.createElement('div');
            header.className = 'bg-gradient-to-r from-red-600/10 to-transparent p-4 border-b border-gray-800 flex justify-between items-center';
            header.innerHTML = `
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid fa-bus text-ttc-red text-base"></i>
                    <h4 class="font-bold text-sm text-gray-200">${route.name}</h4>
                </div>
                <span class="text-[10px] font-semibold bg-gray-800 text-gray-400 px-2 py-0.5 rounded border border-gray-700">
                    ${bayName.replace('Station ', '')}
                </span>
            `;
            card.appendChild(header);

            // Bus departures list
            const list = document.createElement('div');
            list.className = 'p-4 flex-grow space-y-3';

            if (route.stop_times && route.stop_times.length > 0) {
                // Show up to 3 next buses
                route.stop_times.slice(0, 3).forEach(time => {
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center text-sm';

                    const diffSeconds = time.departure_timestamp - referenceTime;
                    const diffMinutes = Math.max(0, Math.round(diffSeconds / 60));

                    let timeText = '';
                    let timeClass = '';

                    if (diffMinutes === 0) {
                        timeText = 'Arriving';
                        timeClass = 'text-green-400 font-bold pulse-live';
                    } else if (diffMinutes === 1) {
                        timeText = '1 min';
                        timeClass = 'text-ttc-red font-semibold';
                    } else if (diffMinutes > 180) {
                        // If it's hours away, show departure time instead of huge minutes
                        timeText = time.departure_time;
                        timeClass = 'text-gray-400';
                    } else {
                        timeText = `${diffMinutes} min`;
                        timeClass = 'text-gray-200 font-semibold';
                    }

                    let dest = time.shape || 'Bus';
                    // Clean destination (e.g., "91A Woodbine To Parkview Hills" -> "Parkview Hills")
                    dest = dest.substring(dest.indexOf('To ')).replace('To ', '');

                    item.innerHTML = `
                        <span class="text-gray-300 truncate max-w-[140px]" title="${dest}">${dest}</span>
                        <div class="text-right">
                            <span class="${timeClass} font-mono">${timeText}</span>
                            <span class="text-[10px] text-gray-500 block">${time.departure_time}</span>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } else {
                list.innerHTML = '<div class="text-center py-4 text-xs text-gray-500">No buses scheduled</div>';
            }

            card.appendChild(list);
            return card;
        }

        // Handle Station Change
        stationSelect.addEventListener('change', (e) => {
            currentStation = e.target.value;
            
            // Clear lists and show skeleton loading state
            platformsContainer.innerHTML = `
                <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 animate-pulse space-y-4">
                    <div class="h-6 bg-gray-800 rounded w-1/3"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                </div>
                <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 animate-pulse space-y-4">
                    <div class="h-6 bg-gray-800 rounded w-1/3"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                    <div class="h-16 bg-gray-800/50 rounded-xl"></div>
                </div>
            `;
            busesSection.classList.add('hidden');
            entrancesGrid.innerHTML = '';
            headerStationName.textContent = 'Loading...';

            fetchData();
        });

        // Event Listeners
        refreshBtn.addEventListener('click', fetchData);

        // Initial Load
        fetchData();

        // Auto Refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
